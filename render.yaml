services:
  - type: web
    name: scientific-parser
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 90 --max-requests 1000 --max-requests-jitter 120 wsgi:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true

